name: Karate API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente donde ejecutar los tests'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - DEV
          - STAGING

jobs:
  run-tests:
    name: Ejecutar Tests Karate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # Step 1 — Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Instalar Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache de dependencias Maven para acelerar ejecuciones
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Step 4 — Pre-descargar dependencias (necesario para aspectjweaver)
      - name: Download dependencies
        run: mvn dependency:resolve -q

      # Step 5 — Ejecutar todos los tests Karate
      # El ambiente se pasa como system property — karate-config.js lo lee con karate.env
      - name: Run Karate Tests
        run: mvn clean test -Dkarate.env=${{ github.event.inputs.environment || 'QA' }}

      # Step 6 — Escribir metadata de ambiente para Allure (igual que tu framework)
      - name: Create Allure environment file
        if: always()
        run: |
          mkdir -p target/allure-results
          cat > target/allure-results/environment.properties << EOF
          Environment=${{ github.event.inputs.environment || 'QA' }}
          Base.URL.Booking=https://restful-booker.herokuapp.com
          Base.URL.Posts=https://jsonplaceholder.typicode.com
          Framework=Karate DSL Automation Framework
          Author=Osiris Montiel Campos
          Java.Version=17
          Karate.Version=1.4.1
          OS=Ubuntu (GitHub Actions)
          Triggered.By=${{ github.actor }}
          Trigger=${{ github.event_name }}
          EOF

      # Step 7 — Generar el reporte HTML de Allure
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      # Step 8 — Subir reporte Allure como artefacto descargable
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 30

      # Step 9 — Subir resultados raw de Allure
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      # Step 10 — Subir reporte HTML nativo de Karate
      - name: Upload Karate HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports/
          retention-days: 30

      # Step 11 — Deploy a GitHub Pages (solo en push a main)
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin/
