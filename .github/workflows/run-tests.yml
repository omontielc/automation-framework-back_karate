# =============================================================
# run-tests.yml
#
# GitHub Actions workflow for the Karate API Automation Framework.
# Triggers on every push or pull request to main branch.
# Executes all Karate tests and publishes the native HTML report
# to GitHub Pages for easy access after each run.
#
# @author Osiris Montiel Campos
# =============================================================
name: Karate API Automation Tests

# =============================================================
# Trigger events
# push/pull_request: runs automatically on code changes
# workflow_dispatch: allows manual execution from GitHub UI
#                   with environment selection
# =============================================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for test execution'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - DEV

jobs:
  run-tests:
    name: Run Karate API Tests
    runs-on: ubuntu-latest

    # Required to allow publishing the report to GitHub Pages
    permissions:
      contents: write

    steps:

      # Step 1 — Check out the repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Java 17 (required by Karate 1.4.0)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache Maven dependencies to speed up subsequent runs
      # Cache key changes only when pom.xml is modified
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Step 4 — Download all project dependencies before running tests
      - name: Download Maven dependencies
        run: mvn dependency:resolve -q

      # Step 5 — Execute all Karate feature files
      # karate.env is read by karate-config.js to load the correct base URLs
      # Defaults to QA if no environment is selected manually
      - name: Run Karate tests
        run: mvn clean test -Dkarate.env=${{ github.event.inputs.environment || 'QA' }}

      # Step 6 — Upload the native Karate HTML report as a downloadable artifact
      # Report is generated automatically in target/karate-reports after every run
      # if: always() ensures the report is uploaded even if tests fail
      - name: Upload Karate HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports/
          retention-days: 30

      # Step 7 — Publish the Karate report to GitHub Pages
      # Only runs on push to main branch, not on pull requests
      # Report will be available at: https://omontielc.github.io/automation-framework-back-karate
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/karate-reports/