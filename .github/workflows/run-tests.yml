# =============================================================
# run-tests.yml
#
# GitHub Actions workflow for the Karate API Automation Framework.
# Triggers on every push or pull request to main branch.
# Executes all Karate tests and publishes the native HTML report
# to GitHub Pages for easy access after each run.
#
# @author Osiris Montiel Campos
# =============================================================
name: Karate API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for test execution'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA
          - DEV
          - STAGING
      tags:
        description: 'Run specific tag (e.g. @TC01, @CRITICAL) — leave empty to run all'
        required: false
        default: ''

jobs:
  run-tests:
    name: Run Karate API Tests
    runs-on: ubuntu-latest

    # Required to allow publishing the report to GitHub Pages
    permissions:
      contents: write

    steps:

      # Step 1 — Check out the repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Java 17 (required by Karate 1.4.0)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache Maven dependencies to speed up subsequent runs
      # Cache key changes only when pom.xml is modified
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Step 4 — Download all project dependencies before running tests
      - name: Download Maven dependencies
        run: mvn dependency:resolve -q

      # Step 5 — Execute all Karate tests
      # karate.env is read by karate-config.js to load the correct base URLs
      # -Dmaven.test.failure.ignore=true prevents workflow from failing on test failures
      # so the report upload steps always execute
      - name: Run Karate tests — all scenarios
        if: github.event.inputs.tags == '' || github.event_name != 'workflow_dispatch'
        run: mvn clean test -Dkarate.env=${{ github.event.inputs.environment || 'QA' }} -Dmaven.test.failure.ignore=true

      # Step 5b — Execute only scenarios matching the selected tag (manual runs only)
      - name: Run Karate tests — filtered by tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tags != ''
        run: mvn clean test -Dkarate.env=${{ github.event.inputs.environment }} -Dkarate.options="--tags ${{ github.event.inputs.tags }}" -Dmaven.test.failure.ignore=true

      # Step 6 — Upload the native Karate HTML report as a downloadable artifact
      # if: always() ensures the report is uploaded even if tests fail
      - name: Upload Karate HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports/
          retention-days: 30

      # Step 7 — Publish the Karate report to GitHub Pages
      # Only runs on push to main, not on pull requests
      # Report available at: https://omontielc.github.io/automation-framework-back-karate
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/karate-reports/